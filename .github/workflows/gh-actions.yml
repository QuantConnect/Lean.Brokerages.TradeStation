name: Trade Station Build & Test

on:
  push:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    container:
        image: quantconnect/lean:foundation
        options: --cpus 12 --memory 12g
        env:
          QC_TRADE_STATION_CLIENT_ID: ${{ env.QC_TRADE_STATION_CLIENT_ID }}
          QC_TRADE_STATION_CLIENT_SECRET: ${{ env.QC_TRADE_STATION_CLIENT_SECRET }}
          QC_TRADE_STATION_ACCOUNT_TYPE: ${{ env.QC_TRADE_STATION_ACCOUNT_TYPE }}
          QC_TRADE_STATION_REFRESH_TOKEN: ${{ env.QC_TRADE_STATION_REFRESH_TOKEN }}
          QC_JOB_USER_ID: ${{ env.QC_JOB_USER_ID }}
          QC_API_ACCESS_TOKEN: ${{ env.QC_API_ACCESS_TOKEN }}
          QC_JOB_ORGANIZATION_ID: ${{ env.QC_JOB_ORGANIZATION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Checkout Lean Same Branch
        id: lean-same-branch
        uses: actions/checkout@v2
        continue-on-error: true
        with:
          ref: ${{ github.ref }}
          repository: QuantConnect/Lean
          path: Lean

      - name: Checkout Lean Master
        if: steps.lean-same-branch.outcome != 'success'
        uses: actions/checkout@v2
        with:
          repository: QuantConnect/Lean
          path: Lean

      - name: Move Lean
        run: mv Lean ../Lean

      - name: Run build and tests
        run: |
          # Build Trade Station Solution
          dotnet build /p:Configuration=Release /v:quiet /p:WarningLevel=1 QuantConnect.TradeStationBrokerage.sln && \
          # Run Trade Station Tests
          dotnet test ./QuantConnect.TradeStationBrokerage.Tests/bin/Release/QuantConnect.Brokerages.TradeStation.Tests.dll

